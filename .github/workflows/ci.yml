name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, bcmath, mbstring
          coverage: none

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/^APP_KEY=$/APP_KEY=base64:dummykeyforci00000000000000000000000000000=/' .env
          sed -i 's/^SENTRY_LARAVEL_DSN=$/SENTRY_LARAVEL_DSN=https:\/\/dummy@sentry.io\/0/' .env
          sed -i 's/^SENTRY_TRACES_SAMPLE_RATE=$/SENTRY_TRACES_SAMPLE_RATE=0.10/' .env

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('bite/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate app key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test

      - name: Check code style
        run: ./vendor/bin/pint --test

      - name: Validate Docker build
        if: github.event_name == 'pull_request'
        working-directory: .
        run: docker build --target app -t bite-pos-test ./bite
