name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
  IMAGE_PATH: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/bite-pos-demo

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, bcmath, mbstring
          coverage: none

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/^APP_KEY=$/APP_KEY=base64:dummykeyforci00000000000000000000000000000=/' .env
          sed -i 's/^SENTRY_LARAVEL_DSN=$/SENTRY_LARAVEL_DSN=https:\/\/dummy@sentry.io\/0/' .env
          sed -i 's/^SENTRY_TRACES_SAMPLE_RATE=$/SENTRY_TRACES_SAMPLE_RATE=0.10/' .env

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('bite/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate app key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test

      - name: Check code style
        run: ./vendor/bin/pint --test

      - name: Validate Docker build
        if: github.event_name == 'pull_request'
        working-directory: .
        run: docker build --target app -t bite-pos-test ./bite

  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Capture current revision for rollback
        id: prev-revision
        run: |
          REV=$(gcloud run services describe $SERVICE \
            --region=$REGION --project=$PROJECT_ID \
            --format="value(status.traffic[0].revisionName)" 2>/dev/null || echo "")
          echo "name=$REV" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Authenticate Docker to Artifact Registry
        run: |
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://us-central1-docker.pkg.dev

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./bite
          push: true
          tags: |
            ${{ env.IMAGE_PATH }}:${{ github.sha }}
            ${{ env.IMAGE_PATH }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE }}
          image: ${{ env.IMAGE_PATH }}:${{ github.sha }}
          region: ${{ env.REGION }}

      - name: Wait for container startup
        run: sleep 30

      - name: Post-deploy health check
        id: health-check
        run: |
          HEALTH_URL="${{ steps.deploy.outputs.url }}/health"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            [ $i -lt 3 ] && sleep 10
          done
          echo "Health check failed after 3 attempts"
          exit 1

      - name: Rollback on health check failure
        if: failure() && steps.prev-revision.outputs.name != ''
        run: |
          echo "Rolling back to ${{ steps.prev-revision.outputs.name }}"
          gcloud run services update-traffic $SERVICE \
            --region=$REGION \
            --project=$PROJECT_ID \
            --to-revisions="${{ steps.prev-revision.outputs.name }}=100"
