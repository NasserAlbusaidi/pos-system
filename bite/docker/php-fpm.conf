[www]
user = www-data
group = www-data
listen = /run/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4

; PHP ini overrides for this pool
php_admin_value[upload_max_filesize] = 20M
php_admin_value[post_max_size] = 50M
php_admin_value[max_file_uploads] = 10
php_admin_value[memory_limit] = 256M

; Capture worker stdout/stderr so error_log() and exceptions reach Cloud Logging
catch_workers_output = yes
decorate_workers_output = no

; CRITICAL: Cloud Run injects env vars into the container at runtime.
; FPM must not clear them or they won't be visible to PHP scripts.
clear_env = no
