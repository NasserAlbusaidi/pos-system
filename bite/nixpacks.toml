# Railway / Nixpacks configuration for Bite-POS
# Nixpacks auto-detects Laravel + Node.js from composer.json + package.json

[phases.build]
cmds = [
    "npm run build",
    "php artisan view:cache",
    "php artisan event:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link 2>/dev/null; php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
